<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jaffna Snacks - Fresh & Tasty</title>
<style>
body {
font-family: Arial, sans-serif;
margin: 0;
padding: 0;
background: #f5f5f5;
}
.hero {
background: #ff6b35;
color: white;
text-align: center;
padding: 40px 20px;
}
.hero h1 {margin: 0; font-size: 32px;}
.hero h2 {margin: 10px 0 0; font-size: 18px;}

/* Category CSS */
.category-tabs {
display: flex;
gap: 10px;
justify-content: center;
margin: 20px 0;
flex-wrap: wrap;
}
.cat-btn {
padding: 10px 20px;
border: 2px solid #ff6b35;
background: white;
color: #ff6b35;
border-radius: 25px;
font-weight: bold;
cursor: pointer;
font-size: 15px;
}
.cat-btn.active, .cat-btn:hover {
background: #ff6b35;
color: white;
}

/* Product Grid */
.products {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
gap: 20px;
padding: 20px;
max-width: 1000px;
margin: auto;
}
.card {
background: white;
border-radius: 12px;
padding: 15px;
text-align: center;
box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.card img {
width: 100%;
height: 150px;
object-fit: cover;
border-radius: 8px;
}
.card h3 {margin: 10px 0 5px; color: #333;}
.card p {margin: 5px 0; color: #ff6b35; font-weight: bold; font-size: 18px;}
.card button {
background: #ff6b35;
color: white;
border: none;
padding: 10px 20px;
border-radius: 8px;
cursor: pointer;
font-weight: bold;
margin-top: 10px;
}
.card button:hover {background: #e55a2b;}

/* Order Form */
.order-form {
max-width: 500px;
margin: 30px auto;
padding: 20px;
background: white;
border-radius: 12px;
box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.order-form input, .order-form textarea, .order-form select {
width: 100%;
padding: 12px;
margin: 8px 0;
border: 1px solid #ddd;
border-radius: 8px;
box-sizing: border-box;
font-size: 15px;
}
.order-form button {
width: 100%;
padding: 15px;
background: #25D366;
color: white;
border: none;
border-radius: 8px;
font-size: 18px;
font-weight: bold;
cursor: pointer;
margin-top: 10px;
}
.order-form button:hover {background: #1da851;}
</style>
</head>
<body>

<div class="hero">
<h1>Fresh & Tasty Food</h1>
<h2>Fast Delivery in Jaffna</h2>
<div style="text-align:center; margin-top:10px; color:white;">
Cart: <span id="cart-count">0</span> items
</div>
</div>

<h2 style="text-align:center; margin-top:30px; color:#ff6b35;">Select Category</h2>
<div class="category-tabs">
<button class="cat-btn active" onclick="filterCategory('all')">All Items</button>
<button class="cat-btn" onclick="filterCategory('snacks')">Snacks</button>
<button class="cat-btn" onclick="filterCategory('sweet')">Sweets</button>
<button class="cat-btn" onclick="filterCategory('cake')">Cakes</button>
</div>

<div class="products">
<!-- Snacks -->
<div class="card" data-cat="snacks">
<img src="https://via.placeholder.com/200x150/ff6b35/fff?text=Mixture" alt="Mixture">
<h3>Mixture</h3>
<p>Rs. 250</p>
<button onclick="addToCart('Mixture', 250)">Add to Cart</button>
</div>

<div class="card" data-cat="snacks">
<img src="https://via.placeholder.com/200x150/ff6b35/fff?text=Pakoda" alt="Pakoda">
<h3>Pakoda</h3>
<p>Rs. 200</p>
<button onclick="addToCart('Pakoda', 200)">Add to Cart</button>
</div>

<div class="card" data-cat="snacks">
<img src="https://via.placeholder.com/200x150/ff6b35/fff?text=Murukku" alt="Murukku">
<h3>Murukku</h3>
<p>Rs. 220</p>
<button onclick="addToCart('Murukku', 220)">Add to Cart</button>
</div>

<!-- Sweets -->
<div class="card" data-cat="sweet">
<img src="https://via.placeholder.com/200x150/ff6b35/fff?text=Laddu" alt="Laddu">
<h3>Laddu</h3>
<p>Rs. 300</p>
<button onclick="addToCart('Laddu', 300)">Add to Cart</button>
</div>

<!-- Cakes -->
<div class="card" data-cat="cake">
<img src="https://via.placeholder.com/200x150/ff6b35/fff?text=Cake" alt="Cake">
<h3>Cake</h3>
<p>Rs. 800</p>
<button onclick="addToCart('Cake', 800)">Add to Cart</button>
</div>
</div>

<div class="order-form">
<h3 style="text-align:center; color:#ff6b35;">Place Your Order</h3>

<select id="order-type" onchange="toggleAddress()">
<option value="Delivery">Delivery</option>
<option value="Take Away">Take Away</option>
</select>

<input type="text" id="name" placeholder="Your Name">
<input type="tel" id="phone" placeholder="Phone Number">

<div id="address-block">
<textarea id="address" placeholder="Delivery Address" rows="3"></textarea>
<input type="date" id="date">
<input type="time" id="time">
</div>

<button onclick="sendOrder()">Order via WhatsApp</button>
</div>

<script>
let cart = [];

function addToCart(name, price){
let item = cart.find(i => i.name === name);
if(item){
item.qty++;
} else {
cart.push({name, price, qty: 1});
}
updateCartCount();
alert(name + ' added! Qty: ' + cart.find(i=>i.name===name).qty);
}

function updateCartCount(){
let total = cart.reduce((sum, i) => sum + i.qty, 0);
document.getElementById('cart-count').innerText = total;
}

function filterCategory(cat){
document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
event.target.classList.add('active');
document.querySelectorAll('.card').forEach(card=>{
if(cat==='all' || card.dataset.cat===cat){
card.style.display='block';
}else{
card.style.display='none';
}
});
}

function toggleAddress(){
let type = document.getElementById('order-type').value;
let block = document.getElementById('address-block');
if(type === 'Take Away'){
block.style.display = 'none';
} else {
block.style.display = 'block';
}
}

function sendOrder(){
let name = document.getElementById('name').value;
let phone = document.getElementById('phone').value;
let orderType = document.getElementById('order-type').value;
let address = document.getElementById('address').value;
let date = document.getElementById('date').value;
let time = document.getElementById('time').value;

if(!name || !phone){
alert('Name & Phone must!');
return;
}
if(orderType==='Delivery' && (!address || !date || !time)){
alert('Delivery ku Address, Date, Time must!');
return;
}
if(cart.length === 0){
alert('Cart empty! Add items first');
return;
}

let orderNo = Math.floor(Math.random()*10000);
let cartText = cart.map(i=>i.name+' x'+i.qty+' Rs.'+i.price).join(', ');
let msg = 'Order #' + orderNo + '\nType: ' + orderType + '\nName: ' + name + '\nPhone: ' + phone;

if(orderType==='Delivery'){
msg += '\nAddress: ' + address + '\nDate: ' + date + '\nTime: ' + time;
}

msg += '\n\nCart: ' + cartText;

window.open('https://wa.me/94771234567?text=' + encodeURIComponent(msg));
alert('Order #' + orderNo + ' WhatsApp ku anupi vitachu! ✅');
}
</script>

</body>
</html>
